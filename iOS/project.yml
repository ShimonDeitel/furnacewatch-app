name: Furnacewatch
options:
  bundleIdPrefix: com.shimondeitel.furnacewatch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Furnacewatch:
    type: application
    platform: iOS
    sources:
      - path: Furnacewatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.furnacewatch
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Furnacewatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FurnacewatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FurnacewatchTests
      - path: Furnacewatch.storekit
    dependencies:
      - target: Furnacewatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.furnacewatch.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FurnacewatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FurnacewatchUITests
    dependencies:
      - target: Furnacewatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.furnacewatch.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Furnacewatch:
    build:
      targets:
        Furnacewatch: all
        FurnacewatchTests: [test]
        FurnacewatchUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Furnacewatch.storekit
    test:
      config: Debug
      storeKitConfiguration: Furnacewatch.storekit
      targets:
        - FurnacewatchTests
        - FurnacewatchUITests
    archive:
      config: Release
